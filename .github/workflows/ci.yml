name: CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  smoke-test:
    name: Python ${{ matrix.python-version }} smoke test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Compile scraper scripts
        run: python -m py_compile complete_proxy_scraper.py enhanced_multi_source_proxy_scraper.py

      - name: Verify command-line interface
        run: python complete_proxy_scraper.py --help
